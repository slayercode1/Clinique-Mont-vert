services:
  db:
    image: postgres:17-alpine
    env_file:
      - ./cmv-backend/.env
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app-net
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app-net
    restart: unless-stopped

  server:
    build:
      context: ./cmv-backend
    env_file:
      - ./cmv-backend/.env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - app-net
      - caddy-net
    restart: unless-stopped

  web:
    build:
      context: ./cmv-web
    depends_on:
      - server
    networks:
      - app-net
      - caddy-net
    restart: unless-stopped

networks:
  app-net:
  caddy-net:
    external: true

volumes:
  postgres-data:
  redis-data:
