name: CD

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Build backend
        working-directory: cmv-backend
        run: |
          npm ci
          npm run build
          npx prisma generate

      - name: Build frontend
        working-directory: cmv-web
        run: |
          npm install
          npm run build

      - name: Create backend .env on runner
        run: echo "${{ secrets.ENV_FILE_BACK }}" > cmv-backend/.env

      - name: Copy files to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_IP }}
          username: ${{ secrets.VPS_USER }}
          port: ${{ secrets.VPS_PORT }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: >-
            compose.yaml,
            cmv-backend/Dockerfile,
            cmv-backend/dist,
            cmv-backend/prisma,
            cmv-backend/views,
            cmv-backend/package.json,
            cmv-backend/package-lock.json,
            cmv-backend/.env,
            cmv-web/Dockerfile,
            cmv-web/dist,
            cmv-web/nginx.conf
          target: /var/html/clinique-monvert
          strip_components: 0
          overwrite: true

      - name: Deploy on VPS
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_IP }}
          username: ${{ secrets.VPS_USER }}
          port: ${{ secrets.VPS_PORT }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /var/html/clinique-monvert
            docker compose down --remove-orphans
            docker compose up --build -d
            docker image prune -f
            docker compose ps
