name: CD - Deploy Clinique Mont-Vert

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_BACKEND: ghcr.io/slayercode1/clinique-mont-vert/backend

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install --legacy-peer-deps
      - run: npx biome check .

  test-backend:
    runs-on: ubuntu-latest
    needs: lint
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: cmv-backend/package-lock.json

      - name: Install dependencies
        working-directory: cmv-backend
        run: npm ci

      - name: Create schemas and run migrations
        working-directory: cmv-backend
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/test_db
        run: |
          PGPASSWORD=test psql -h localhost -U test -d test_db -c 'CREATE SCHEMA IF NOT EXISTS "cmv-it"; CREATE SCHEMA IF NOT EXISTS "cmv-fleet";'
          npx prisma migrate deploy

      - name: Run tests
        working-directory: cmv-backend
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/test_db
          REDIS_URL: redis://localhost:6379
          JWT_SECRET_KEY: test_secret
          NODE_ENV: test
        run: npm test

  test-frontend:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: cmv-web/package.json

      - name: Install dependencies
        working-directory: cmv-web
        run: npm install --legacy-peer-deps

      - name: Run tests
        working-directory: cmv-web
        run: npm test

  build-and-push:
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend]
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: ./cmv-backend
          push: true
          tags: |
            ${{ env.IMAGE_BACKEND }}:latest
            ${{ env.IMAGE_BACKEND }}:${{ github.sha }}
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend

      - name: Build frontend
        working-directory: cmv-web
        run: |
          npm install --legacy-peer-deps
          npm run build

      - name: Upload frontend dist
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: cmv-web/dist

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - uses: actions/checkout@v4

      - name: Download frontend dist
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: frontend-dist

      - name: Copy files to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_IP }}
          username: ${{ secrets.VPS_USER }}
          port: ${{ secrets.VPS_PORT }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: "compose.yaml,frontend-dist/*"
          target: /tmp/clinique-deploy
          overwrite: true

      - name: Deploy on VPS
        uses: appleboy/ssh-action@v1.2.0
        env:
          ENV_FILE: ${{ secrets.ENV_FILE_BACK }}
          GH_TOKEN: ${{ secrets.GHCR_TOKEN }}
          GH_USER: ${{ github.actor }}
        with:
          host: ${{ secrets.VPS_IP }}
          username: ${{ secrets.VPS_USER }}
          port: ${{ secrets.VPS_PORT }}
          key: ${{ secrets.VPS_SSH_KEY }}
          envs: ENV_FILE,GH_TOKEN,GH_USER
          script: |
            # Deploy frontend static files
            rm -rf /var/html/clinique/*
            cp -r /tmp/clinique-deploy/frontend-dist/* /var/html/clinique/

            # Deploy backend
            cd /var/html/clinique-monvert
            cp /tmp/clinique-deploy/compose.yaml .
            mkdir -p cmv-backend
            echo "${ENV_FILE}" > cmv-backend/.env

            # Login to GitHub Container Registry
            echo "${GH_TOKEN}" | docker login ghcr.io -u "${GH_USER}" --password-stdin

            # Pull latest images and deploy
            docker compose pull
            docker compose up -d

            # Run migrations
            docker compose exec -T server npx prisma migrate deploy

            # Cleanup
            rm -rf /tmp/clinique-deploy
            docker image prune -f
            docker compose ps
